<div class="bootstrap-wrapper">
  <div class="container-fluid">
    <h1 class="mt-3">Available Quizzes</h1>

    <div class="row mt-3">
      <div class="col-md-4 mb-3" *ngFor="let q of quizzes">
        <mat-card class="h-100" style="display: flex; flex-direction: column">
          <mat-card-header>
            <div mat-card-avatar>
              <img
                src="assets/quiz.jpg"
                style="max-width: 40px"
                alt="icon"
                onerror="this.style.display = 'none'"
              />
            </div>
            <mat-card-title>{{ q.title }}</mat-card-title>
            <mat-card-subtitle>{{ q.category.title }}</mat-card-subtitle>
          </mat-card-header>

          <mat-card-content style="flex-grow: 1" class="mt-2">
            <p>{{ q.description | slice: 0 : 80 }}...</p>
          </mat-card-content>

          <mat-card-actions>
            <button
              [routerLink]="'/user-dashboard/instructions/' + q.qId"
              mat-flat-button
              color="primary"
            >
              Start
            </button>
            <button mat-button color="accent" class="ms-2">
              Questions: {{ q.numberOfQuestions }}
            </button>
            <button mat-button class="ms-2">Marks: {{ q.maxMarks }}</button>
          </mat-card-actions>
        </mat-card>
      </div>

      <div class="col-md-12" *ngIf="quizzes.length == 0">
        <mat-card>
          <mat-card-content class="text-center">
            <h3>No active quizzes available in this category right now.</h3>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>
</div>
