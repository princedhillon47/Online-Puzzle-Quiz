<div class="bootstrap-wrapper">
  <div class="container mt-5">
    <div class="row">
      <div class="col-md-6 offset-md-3">
        <mat-card>
          <mat-card-header>
            <mat-card-title>Login to Exam Portal</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <form (ngSubmit)="formSubmit()">
              
              <mat-form-field class="w-100 mt-3" appearance="outline">
                <mat-label>Username</mat-label>
                <input required [(ngModel)]="loginData.username" name="username" matInput placeholder="Enter your username">
              </mat-form-field>

              <mat-form-field class="w-100" appearance="outline">
                <mat-label>Password</mat-label>
                <input required [(ngModel)]="loginData.password" name="password" type="password" matInput placeholder="Enter your password">
              </mat-form-field>

              <div class="text-center mt-3 mb-2">
                <button type="submit" mat-raised-button color="primary">Login</button>
                <button type="reset" mat-raised-button color="accent" class="ms-2">Clear</button>
              </div>

            </form>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>
</div>
