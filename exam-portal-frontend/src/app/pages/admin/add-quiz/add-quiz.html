<mat-card>
  <mat-card-header>
    <mat-card-title>Add New Quiz</mat-card-title>
    <mat-card-subtitle>Enter details for the new quiz</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <form (ngSubmit)="formSubmit()" class="mt-3">
      
      <mat-form-field class="w-100" appearance="outline">
        <mat-label>Quiz Title</mat-label>
        <input required [(ngModel)]="quizData.title" name="title" matInput placeholder="Enter title">
      </mat-form-field>

      <mat-form-field class="w-100" appearance="outline">
        <mat-label>Description</mat-label>
        <textarea [(ngModel)]="quizData.description" name="description" matInput placeholder="Enter description" rows="4"></textarea>
      </mat-form-field>

      <div class="row">
        <div class="col-md-6">
          <mat-form-field class="w-100" appearance="outline">
            <mat-label>Maximum Marks</mat-label>
            <input required [(ngModel)]="quizData.maxMarks" name="maxMarks" type="number" matInput placeholder="e.g. 100">
          </mat-form-field>
        </div>
        
        <div class="col-md-6">
          <mat-form-field class="w-100" appearance="outline">
            <mat-label>Number of Questions</mat-label>
            <input required [(ngModel)]="quizData.numberOfQuestions" name="numberOfQuestions" type="number" matInput placeholder="e.g. 20">
          </mat-form-field>
        </div>
      </div>

      <div class="mt-2 mb-3">
        <mat-slide-toggle [(ngModel)]="quizData.active" name="active" color="primary">
          Publish Status (Active/Hidden)
        </mat-slide-toggle>
      </div>

      <mat-form-field class="w-100" appearance="outline">
        <mat-label>Select Category</mat-label>
        <mat-select name="category" [(ngModel)]="quizData.category.cid">
          <mat-option *ngFor="let c of categories" [value]="c.cid">
            {{ c.title }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <div class="text-center mt-2">
        <button type="submit" mat-raised-button color="primary">Add Quiz</button>
        <button type="reset" mat-raised-button color="accent" class="ms-2">Clear</button>
      </div>

    </form>
  </mat-card-content>
</mat-card>
